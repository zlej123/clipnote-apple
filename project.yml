name: clipnote-apple
options:
  bundleIdPrefix: com.clipnote
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  createIntermediateGroups: true
targets:
  Clipnote:
    type: application
    supportedDestinations: [iOS, macOS]
    sources:
      - Sources
      - path: Resources/skill-core
        type: folder
        buildPhase: resources
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: clipnote
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
        UILaunchScreen: {}
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: true
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
    dependencies:
      - target: ClipnoteShare
        platformFilter: iOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.clipnote.app
        PRODUCT_NAME: clipnote
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        "CODE_SIGN_ENTITLEMENTS[sdk=iphone*]": Sources/Clipnote-iOS.entitlements
        "CODE_SIGN_ENTITLEMENTS[sdk=macosx*]": Sources/Clipnote-macOS.entitlements
        # 개발팀 미설정 환경(CI/스파이크)에서 로컬 실행 가능하도록 ad-hoc 서명 사용.
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        CODE_SIGNING_REQUIRED: NO
  ClipnoteTests:
    type: bundle.unit-test
    supportedDestinations: [iOS, macOS]
    sources:
      - path: Tests
        excludes:
          - "Fixtures/**"
      - path: Tests/Fixtures
        type: folder
        buildPhase: resources
    dependencies:
      - target: Clipnote
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.clipnote.tests
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: $(TEST_HOST)
        "TEST_HOST[sdk=macosx*]": $(BUILT_PRODUCTS_DIR)/clipnote.app/Contents/MacOS/clipnote
        "TEST_HOST[sdk=iphonesimulator*]": $(BUILT_PRODUCTS_DIR)/clipnote.app/clipnote
        # 개발팀 미설정 환경(CI/스파이크)에서 로컬 실행 가능하도록 ad-hoc 서명 사용 (테스트 번들도 동일 서명 문제를 겪을 수 있음).
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        CODE_SIGNING_REQUIRED: NO
  ClipnoteShare:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - ShareExtension
      - Sources/Models/YouTubeURL.swift
    info:
      path: ShareExtension/Info.plist
      properties:
        CFBundleDisplayName: clipnote
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShareViewController
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.clipnote.app.share
        SWIFT_VERSION: "6.0"
        CODE_SIGN_ENTITLEMENTS: ShareExtension/ClipnoteShare.entitlements
schemes:
  Clipnote:
    build:
      targets:
        Clipnote: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ClipnoteTests
